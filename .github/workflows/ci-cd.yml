name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  FLASK_DEBUG: 0
  FLASK_TESTING: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and lint
        run: |
          pip install flake8==7.1.2
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=9999 --statistics

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          pytest tests/unit --cov=app --cov-report=xml
          pytest tests/integration

  build:
    name: Build & Push Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:latest \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${SHORT_SHA} .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend --all-tags

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"service\":\"backend\",\"image\":\"${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${SHORT_SHA}\"}"
