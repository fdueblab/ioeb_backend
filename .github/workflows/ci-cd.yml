name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.10"
  FLASK_DEBUG: 0
  FLASK_TESTING: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and lint
        run: |
          pip install flake8==7.1.2
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=9999 --statistics

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          pytest tests/unit --cov=app --cov-report=xml
          pytest tests/integration

      - name: Verify services bind mount permissions
        run: |
          docker build -t ioeb-backend:permission-test .
          services_dir="${RUNNER_TEMP}/ioeb-services-permission-test"
          sudo mkdir -p "${services_dir}"
          sudo chown root:root "${services_dir}"
          sudo chmod 0755 "${services_dir}"
          docker run --rm \
            -e SERVICES_BASE_PATH=/app/data/services \
            -v "${services_dir}:/app/data/services" \
            ioeb-backend:permission-test \
            python -c "import os; from pathlib import Path; assert os.getuid() == 1000; Path('/app/data/services/probe').mkdir()"
          test -d "${services_dir}/probe"

  build:
    name: Build & Push Image
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
            docker build \
              -t ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${IMAGE_TAG} .
            docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${IMAGE_TAG}
          else
            IMAGE_TAG=${GITHUB_SHA::7}
            docker build \
              -t ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:latest \
              -t ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${IMAGE_TAG} .
            docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:latest
            docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${IMAGE_TAG}
          fi

  deploy-staging:
    name: Deploy Staging
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging deploy webhook
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          curl -sf -X POST "${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}" \
            -H "X-Deploy-Token: ${{ secrets.STAGING_DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"service\":\"backend\",\"image\":\"${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${IMAGE_TAG}\"}"

  deploy-production:
    name: Deploy Production
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deploy webhook
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}"
          curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"service\":\"backend\",\"image\":\"${{ secrets.DOCKER_HUB_USERNAME }}/ioeb-backend:${IMAGE_TAG}\"}"
