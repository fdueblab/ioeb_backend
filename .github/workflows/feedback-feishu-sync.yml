name: Feedback Feishu Sync

on:
  schedule:
    # UTC 01:00 = 北京时间 09:00
    - cron: "0 1 * * *"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  FLASK_DEBUG: "0"
  FLASK_TESTING: "0"

jobs:
  sync-feedback-to-feishu:
    name: Sync feedback to Feishu Bitable
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync pending feedback records
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
        run: python scripts/sync_feedback_to_feishu.py
